apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: prepare-agent
  namespace: kagent
spec:
  description: "Copia staging in produzione, builda immagine prod, pulisce staging."
  type: Declarative
  skills:
    insecureSkipVerify: true
    refs:
      - host.minikube.internal:5000/agente-prepare-skill:latest
  declarative:
    stream: true
    a2aConfig:
      skills:
      - id: prepare-skill
        name: Prepare Skill
        description: Applica staging a sorgente, build immagine
        inputModes:
          - text
        outputModes:
          - text
        tags:
          - image
    modelConfig: openai-gpt-4o
    systemMessage: |
      Sei un agente di preparazione per il deploy Flask.
      Quando ricevi una richiesta, carica la skill agente-prepare-skill ed esegui i passi indicati.
      NON fare domande. NON mostrare menu. Esegui e restituisci il risultato.
      Usa il parametro file_path (NON path) per read_file e edit_file.
    tools:
      - type: McpServer
        mcpServer:
          apiGroup: kagent.dev
          kind: RemoteMCPServer
          name: filesystem-local
          namespace: kagent
          toolNames:
            - read_file
            - edit_file
      - type: McpServer
        mcpServer:
          apiGroup: kagent.dev
          kind: RemoteMCPServer
          name: docker-local
          namespace: kagent
          toolNames:
            - build_image
            - list_images
            - remove_image
      - type: McpServer
        mcpServer:
          apiGroup: kagent.dev
          kind: RemoteMCPServer
          name: shell-local
          namespace: kagent
          toolNames:
            - execute_command
      - type: McpServer
        mcpServer:
          apiGroup: kagent.dev
          kind: RemoteMCPServer
          name: kagent-tool-server
          namespace: kagent
          toolNames:
            - k8s_apply_manifest
            - k8s_delete_resource
    deployment:
      volumes:
        - name: desktop-volume
          hostPath:
            path: /host-desktop
            type: Directory
      volumeMounts:
        - name: desktop-volume
          mountPath: /desktop
